<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <!-- Tailwind + Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Geist font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen mx-auto bg-[#F8FAFC]">
    <div class="navbar bg-base-100 shadow-sm">


        <div class="flex justify-between items-center w-full p-2">

            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" alt="" width="30px">
                <h2 class="font-semibold text-xl">GitHub Issues Tracker</h2>
            </div>

            <div class="flex items-center gap-2">
                <input type="text" placeholder="Search issues..."
                    class="text-[#64748B]  text-base input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue </button>
            </div>
        </div>
    </div>
    <div class="bg-white mx-auto my-10 container max-w-[1110px] w-full p-2">
        <button class="btn btn-soft btn-primary">All</button>
        <button class="btn btn-soft btn-primary">Open</button>
        <button class="btn btn-soft btn-primary">Closed</button>

    </div>

    <div class="bg-white mx-auto my-10 container max-w-[1110px] w-full py-4">

        <div class="flex items-center justify-between p-4 bg-white border-b border-gray-100">
            <div class="flex items-center gap-4">
                <div class="flex h-12 w-12 items-center justify-center rounded-full bg-purple-100">
                    <img src="./assets/Aperture.png" alt="Aperture Icon" class="h-6 w-6">
                </div>

                <div>
                    <h2 class="text-xl font-bold text-slate-900">50 Issues</h2>
                    <p class="text-sm text-slate-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="h-3 w-3 rounded-full bg-emerald-500"></span>
                    <span class="text-sm font-medium text-slate-700">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="h-3 w-3 rounded-full bg-purple-500"></span>
                    <span class="text-sm font-medium text-slate-700">Closed</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 h-50 bg-gray-50">

            <div
                class="card w-80 bg-base-100 shadow-sm border border-base-200 border-t-4 border-t-success rounded-lg overflow-hidden">
                <div class="card-body p-5">

                    <div class="flex justify-between items-center mb-2">
                        <div class="avatar placeholder">
                            <div class="bg-success/10 text-success rounded-full w-6">
                                <span class="text-xs">○</span>
                            </div>
                        </div>
                        <div class="badge badge-ghost text-error bg-error/10 border-none font-bold text-[10px]">HIGH
                        </div>
                    </div>

                    <h2 class="card-title text-base font-bold leading-tight">
                        Fix Navigation Menu On Mobile Devices
                    </h2>
                    <p class="text-sm text-base-content/60 mt-1 line-clamp-2">
                        The navigation menu doesn't collapse properly on mobile devices...
                    </p>

                    <div class="card-actions mt-4">
                        <div class="badge badge-outline border-error/30 text-error gap-1 py-3">
                            <span class="text-[10px]">🚩</span> BUG
                        </div>
                        <div class="badge badge-outline border-warning/30 text-warning gap-1 py-3">
                            <span class="text-[10px]">⚙️</span> HELP WANTED
                        </div>
                    </div>

                    <div class="divider my-2 opacity-50"></div>
                    <div class="flex flex-col text-[11px] text-base-content/50 space-y-1">
                        <span>#1 by john_doe</span>
                        <span>1/15/2024</span>
                    </div>

                </div>
            </div>





        </div>

    </div>


    <script src="./scripts/signin.js"></script>
</body>

</html>
